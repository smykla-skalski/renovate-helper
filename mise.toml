[tools]
go = "1.26.1"
goreleaser = "latest"

[tasks.dev]
description = "Start the app"
run = "go run main.go"

[tasks.build]
description = "Build binary"
run = "go build -o gh-renovate-tracker ."

[tasks.release-snapshot]
description = "Build snapshot release"
run = "goreleaser build --snapshot --clean"

[tasks.check]
description = "Run lint and tests"
depends = ["lint", "test"]

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks.snapshots]
description = "Regenerate golden snapshot files"
run = "go test ./internal/tui/ -update"

[tasks.upgrade]
description = "Upgrade gh extension to latest release"
run = "gh ext upgrade renovate-helper"
