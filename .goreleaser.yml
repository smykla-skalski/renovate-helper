version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gh-renovate-tracker
    main: .
    binary: gh-renovate-tracker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: smykla-skalski
    name: gh-renovate-helper
